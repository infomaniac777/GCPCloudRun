<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Infomanic Cloud Run</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --panel: #1a2332;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #5b9fd4;
        --accent-dim: #3d7aad;
        --error: #e07070;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f4f6f9;
          --panel: #fff;
          --text: #1a2332;
          --muted: #5c6b7f;
          --accent: #2563eb;
          --accent-dim: #1d4ed8;
          --error: #b91c1c;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, rgba(91, 159, 212, 0.2), transparent),
          var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      main {
        width: 100%;
        max-width: 28rem;
        background: var(--panel);
        border-radius: 16px;
        padding: 1.75rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin: 0 0 0.35rem;
      }
      h2 {
        font-size: 1.05rem;
        font-weight: 600;
        margin: 0 0 0.75rem;
      }
      p.lead {
        margin: 0 0 1.25rem;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.45;
      }
      label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }
      input[type="number"] {
        width: 100%;
        padding: 0.65rem 0.75rem;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.15);
        color: inherit;
        font-size: 1rem;
      }
      @media (prefers-color-scheme: light) {
        input[type="number"] {
          background: #f4f6f9;
          border-color: #d1d9e6;
        }
      }
      button {
        width: 100%;
        margin-top: 0.25rem;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent-dim));
        color: #fff;
        transition: opacity 0.15s, transform 0.05s;
      }
      button:hover:not(:disabled) {
        opacity: 0.95;
      }
      button:active:not(:disabled) {
        transform: scale(0.99);
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .status {
        margin-top: 1.25rem;
        min-height: 5rem;
        padding: 1rem;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.2);
        font-size: 0.9rem;
        line-height: 1.5;
      }
      @media (prefers-color-scheme: light) {
        .status {
          background: #f4f6f9;
        }
      }
      .status.idle {
        color: var(--muted);
      }
      .status.loading {
        color: var(--muted);
      }
      .status.ok strong {
        font-size: 1.75rem;
        color: var(--accent);
        display: block;
        margin-bottom: 0.35rem;
      }
      .status.err {
        color: var(--error);
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.8rem;
        word-break: break-all;
      }
      .pulse {
        display: inline-block;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.45;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Infomanic Cloud Run</h1>
      <h2>Add two numbers</h2>
      <p class="lead">
        Numbers are sent to the server; the sum and a server timestamp come back in the response so you can see real backend work—not just browser math.
      </p>
      <form id="add-form" novalidate>
        <div class="row">
          <div>
            <label for="a">First number</label>
            <input id="a" name="a" type="number" step="1" required />
          </div>
          <div>
            <label for="b">Second number</label>
            <input id="b" name="b" type="number" step="1" required />
          </div>
        </div>
        <button type="submit" id="submit-btn">Add on server</button>
      </form>
      <div id="status" class="status idle">
        <span class="mono"></span>
      </div>
    </main>
    <script>
      (function () {
        const form = document.getElementById("add-form");
        const statusEl = document.getElementById("status");
        const submitBtn = document.getElementById("submit-btn");

        function setStatus(className, html) {
          statusEl.className = "status " + className;
          statusEl.innerHTML = html;
        }

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const a = document.getElementById("a").value;
          const b = document.getElementById("b").value;

          if (a === "" || b === "") {
            setStatus("err", "Please enter both numbers.");
            return;
          }

          const payload = { a: Number(a), b: Number(b) };
          if (!Number.isInteger(payload.a) || !Number.isInteger(payload.b)) {
            setStatus("err", "Only whole numbers are accepted.");
            return;
          }

          submitBtn.disabled = true;
          try {
            setStatus(
              "loading",
              '<span class="pulse">Calling backend…</span> <span class="mono">POST /api/add</span>'
            );

            const started = performance.now();
            const res = await fetch("/api/add", {
              method: "POST",
              headers: { "Content-Type": "application/json", Accept: "application/json" },
              body: JSON.stringify(payload),
            });
            const elapsed = Math.round(performance.now() - started);
            const text = await res.text();
            let data;
            try {
              data = JSON.parse(text);
            } catch {
              setStatus("err", "Server did not return JSON. HTTP " + res.status);
              return;
            }

            if (!res.ok) {
              const detail =
                data.detail != null ? JSON.stringify(data.detail) : text.slice(0, 200);
              setStatus("err", "Request failed (" + res.status + "): " + detail);
              return;
            }

            setStatus(
              "ok",
              "<strong>" +
                data.result +
                "</strong>" +
                payload.a +
                " + " +
                payload.b +
                " = " +
                data.result +
                "<br /><span class='muted' style='color:var(--muted)'>Server time (UTC):</span> " +
                "<span class='mono'>" +
                data.computed_at +
                "</span><br /><span class='muted' style='color:var(--muted)'>Round trip:</span> " +
                elapsed +
                " ms"
            );
          } catch (err) {
            setStatus("err", "Network error: " + (err && err.message ? err.message : String(err)));
          } finally {
            submitBtn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
